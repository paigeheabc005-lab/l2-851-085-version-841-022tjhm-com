  <meta name="theme-color" content="#E88452">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">

<title>影片库｜静态影像库</title>

<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html" aria-label="返回首页">
        <span class="brand-mark">▶</span>
        <span class="brand-text"><strong>静态影像库</strong><span>2000 部影片 · 纯静态站点</span></span>

      <button class="menu-btn" id="menu-btn" aria-label="切换导航">☰</button>
      <nav class="nav" id="site-nav"><a class="" href="index.html">首页</a>
<a class="active" href="browse.html">影片库</a>
<a class="" href="archives.html">档案馆</a>
<a class="" href="about.html">关于本站</a></nav>
      <div class="header-actions">
        <a class="ghost-btn" href="browse.html">立即浏览</a>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-shell">
          <div class="hero-grid" style="grid-template-columns: 1fr;">
            <div class="hero-copy">
              <div class="kicker">影片库 · 搜索 / 筛选 / 排序 / 分页</div>
              <h1>用关键词、类型、地区和年份，快速找到你想看的内容。</h1>
              <p>页面数据由你上传的 2000 条影片信息驱动，可直接在静态环境中浏览。输入标题、标签或简介关键词，立刻缩小范围。</p>
              <div class="hero-actions">
                <a class="primary-btn" href="#catalog">开始筛选</a>
                <a class="ghost-btn" href="index.html">返回首页</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="catalog">
      <div class="container">
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2 class="section-title">全量影片筛选</h2>
              <p>默认每页 24 部，支持本地静态分页。</p>
            </div>
          </div>
          <div class="toolbar">
            <div class="field">
              <label for="q">关键词</label>
              <input id="q" type="search" placeholder="搜索标题、简介、标签、地区……" autocomplete="off">
            </div>
            <div class="field">
              <label for="type">类型</label>
              <select id="type">
                <option value="">全部类型</option>
                <option value="电影">电影</option><option value="剧集">剧集</option><option value="电视剧">电视剧</option><option value="动画电影">动画电影</option><option value="动画剧集">动画剧集</option><option value="综艺">综艺</option><option value="网络电影">网络电影</option><option value="纪录片">纪录片</option><option value="动画">动画</option><option value="电影/动画">电影/动画</option><option value="网络剧">网络剧</option><option value="动漫">动漫</option><option value="综艺/真人秀">综艺/真人秀</option><option value="网剧">网剧</option>
              </select>
            </div>
            <div class="field">
              <label for="region">地区</label>
              <select id="region">
                <option value="">全部地区</option>
                <option value="中国大陆">中国大陆</option><option value="美国">美国</option><option value="日本">日本</option><option value="中国香港">中国香港</option><option value="韩国">韩国</option><option value="中国台湾">中国台湾</option><option value="法国">法国</option><option value="英国">英国</option><option value="中国">中国</option><option value="意大利">意大利</option><option value="泰国">泰国</option><option value="西班牙">西班牙</option><option value="香港">香港</option><option value="德国">德国</option>
              </select>
            </div>
            <div class="field">
              <label for="year">年份</label>
              <select id="year">
                <option value="">全部年份</option>
                <option value="2031">2031</option><option value="2030">2030</option><option value="2029">2029</option><option value="2028">2028</option><option value="2027">2027</option><option value="2026">2026</option><option value="2025">2025</option><option value="2024">2024</option><option value="2023">2023</option><option value="2022">2022</option><option value="2021">2021</option><option value="2020">2020</option><option value="2019">2019</option><option value="2018">2018</option><option value="2017">2017</option><option value="2016">2016</option><option value="2015">2015</option><option value="2014">2014</option><option value="2013">2013</option><option value="2012">2012</option><option value="2011">2011</option><option value="2010">2010</option><option value="2009">2009</option><option value="2008">2008</option><option value="2007">2007</option><option value="2006">2006</option><option value="2005">2005</option><option value="2004">2004</option><option value="2003">2003</option><option value="2002">2002</option><option value="2001">2001</option><option value="2000">2000</option><option value="1999">1999</option><option value="1998">1998</option><option value="1997">1997</option><option value="1996">1996</option><option value="1995">1995</option><option value="1994">1994</option><option value="1993">1993</option><option value="1992">1992</option><option value="1991">1991</option><option value="1990">1990</option><option value="1989">1989</option><option value="1988">1988</option><option value="1987">1987</option><option value="1986">1986</option><option value="1985">1985</option><option value="1982">1982</option><option value="1980">1980</option><option value="1979">1979</option><option value="1978">1978</option><option value="1976">1976</option><option value="1975">1975</option><option value="1974">1974</option><option value="1973">1973</option><option value="1971">1971</option><option value="1970">1970</option><option value="1968">1968</option><option value="1967">1967</option><option value="1965">1965</option><option value="1964">1964</option><option value="1963">1963</option><option value="1960">1960</option><option value="1959">1959</option><option value="1953">1953</option><option value="1945">1945</option><option value="1943">1943</option><option value="1941">1941</option><option value="1937">1937</option><option value="1933">1933</option><option value="1926">1926</option><option value="1919">1919</option>
              </select>
            </div>
            <div class="field">
              <label for="sort">排序</label>
              <select id="sort">
                <option value="latest">最新优先</option>
                <option value="oldest">最早优先</option>
                <option value="title">标题排序</option>
                <option value="region">地区排序</option>
              </select>
            </div>
            <div class="filter-actions">
              <button class="filter-btn" id="reset" type="button">重置</button>
            </div>
          </div>
          <div class="browse-head">
            <div class="results-count" id="results-count">正在加载影片数据…</div>
            <div class="chips"><a class="chip" href="browse.html?year=2031">2031</a><a class="chip" href="browse.html?year=2030">2030</a><a class="chip" href="browse.html?year=2029">2029</a><a class="chip" href="browse.html?year=2028">2028</a><a class="chip" href="browse.html?year=2027">2027</a><a class="chip" href="browse.html?year=2026">2026</a></div>
          </div>
          <div class="panel-body">
            <div class="grid catalog" id="browse-grid"></div>
            <div class="pagination" id="pagination"></div>
          </div>
        </div>
      </div>
    </section>
  </main>
